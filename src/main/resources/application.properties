frosk.swedish.longterm.pegratio.threshold=2.5
## Månadsportföljen exits on strong risk-off only (score above this), with an ATR trailing stop
frosk.swedish.longterm.hedge.exit.score=9
frosk.swedish.longterm.atr.mult=3.0

## Portfolio quality filters
## Min SQN for any position to appear in portfolio snapshot (1.0 = acceptable, 2.0 = good)
frosk.portfolio.min.sqn=1.0
## Min win rate (profitable trades ratio) for any position, in PERCENT (40.0 = 40%)
frosk.portfolio.min.win.rate=40.0
## Max positions for non-Månadsportfölj strategies combined, ranked by SQN descending
frosk.portfolio.other.topN=12
## When true, bypasses the same-day idempotency check and always rebuilds the portfolio
frosk.portfolio.force.rebuild=false
## Hard stop-loss % below entry for ShortTermMomentumLongTermStrengthStrategy
frosk.slms.stoploss.percent=10.0
## ADX(14) trend-strength entry filter and ATR(14) trailing-stop multiplier for SLMS
frosk.slms.adx.threshold=25.0
frosk.slms.atr.mult=2.5
## Max HedgeIndex score for new SLMS entries (8+ = defensive, blocked)
frosk.slms.hedge.max.score=7
## SLMS positions exit only on strong risk-off (score above this value)
frosk.slms.hedge.exit.score=9
frosk.highlander.stoploss.percent=12.0
frosk.highlander.atr.mult=3.0
frosk.canslim.stoploss.percent=15.0
frosk.canslim.volume.multiplier=1.5
frosk.canslim.fiftytwo.week.threshold=0.95
frosk.strategy.catastrophic.stop.pct=15.0
## When true, bypasses the same-day idempotency check and always re-runs strategies
frosk.strategy.force.rerun=false
frosk.strategies.hedge.strategy=VIXStrategy,VVIXStrategy,CrudeOilStrategy,GoldStrategy,SP500Strategy,BetaStrategy,EURUSDStrategy,USDJPYStrategy,AUDUSDStrategy,DXYStrategy,VSTOXXStrategy,OMXvsSTOXX50Strategy,TreasuryYieldStrategy,YieldCurveSpreadStrategy
