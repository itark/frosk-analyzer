## Scheduler cron expressions (Tier 0/1/2/3)
## Tier 0: every 10 min during Stockholm market hours 08:30-17:30
## Cron covers 08:00-17:59; precise 08:30-17:30 window enforced in HighLander.syncTier0()
scheduler.tier0.cron=0 */10 8-17 * * MON-FRI
## Tier 1: MON-FRI at 18:00 — OMXS30 + HedgeIndex sync (~40 req/run)
scheduler.tier1.cron=0 0 18 * * MON-FRI
## Tier 2: Saturday at 06:00 — full universe sync (~900 req/run)
scheduler.tier2.cron=0 0 6 * * SAT
## Tier 3: 1st of each month at 07:00 — metadata update (~1,800 req/run)
scheduler.tier3.cron=0 0 7 1 * *
## Politeness delay (ms) between consecutive Yahoo ticker fetches. Yahoo's
## v8/v10 endpoints are free but unofficial — they can throttle/IP-block on
## bursty traffic. Applied in both the full-universe daily/weekly sync
## (YAHOODataManager) and the Tier-0 intraday loop (IntradayDataService).
## Set to 0 to disable.
yahoo.fetch.delay.ms=300
## Crypto: daily at 00:30 — Coinbase price sync + strategy run
scheduler.crypto.cron=0 30 0 * * *
## Crypto intraday 15m candle sync — disabled by default ("-"); the crypto
## profile enables it every 15 minutes around the clock (crypto trades 24/7)
scheduler.crypto.intraday.cron=-
## Coinbase products synced for 15m bars — top-liquidity pairs only,
## thin pairs have spreads that eat any intraday edge
crypto.intraday.products=BTC-EUR,ETH-EUR,SOL-EUR

## Crypto regime gate: risk-on while this product closes above its daily SMA
crypto.regime.product=BTC-EUR
crypto.regime.sma.period=20

## CryptoRangeBreakoutIntradayStrategy (15m bars; 24 bars = 6h range, 96 = 24h)
crypto.breakout.range.bars=24
crypto.breakout.min.range.width.pct=1.5
crypto.breakout.trend.period=96
crypto.breakout.atr.stop.mult=1.5
crypto.breakout.atr.trail.mult=2.5
crypto.breakout.max.bars.held=96

## CryptoVWAPReversionIntradayStrategy — stretch is also the gross target,
## sized to clear the 1.2% taker round-trip
crypto.vwap.stretch.pct=1.8
crypto.vwap.rsi.entry=30.0
crypto.vwap.stop.pct=2.7
crypto.vwap.max.bars.held=48

## Intraday pipeline settings
## Datasets whose securities are synced for intraday bars (comma-separated)
intraday.datasets=OMX30
## Intraday strategies block new entries when HedgeIndex score exceeds this
## (9 = only strong risk-off blocks; intraday setups are less regime-sensitive
## than swing entries, and a gate at 7 stopped all trading in defensive weeks)
frosk.intraday.hedge.max.score=9
## Number of days of 15m bars to retain in the intraday_bar table (rolling window).
## 30 days keeps enough history to evaluate intraday strategy changes on a
## meaningful sample (the 7-day window left ~5 trading days of backtest data).
intraday.retention.days=30

#02.00 every day (legacy — kept for reference, no longer used by Scheduler)
download.schedule=0 0 2 * * *

#Session timeout. If a duration suffix is not specified, seconds will be used.
server.servlet.session.timeout=500

