# ========================================
# Crypto profile — Coinbase data on port 8081
# Start: mvn spring-boot:run -Dspring-boot.run.profiles=crypto
# ========================================

server.port=8081

# The crypto H2 file IS the main (and only) datasource for this process
spring.datasource.url=jdbc:h2:file:~/itark/froskH2DBCryptoFile;AUTO_SERVER=TRUE

frosk.adddatasetandsecurities=true
frosk.addsecuritypricesfromcoinbase=true
frosk.addsecuritypricesfromyahoo=false
frosk.updatesecuritymetadata=false
frosk.runallstrategies=true
# No daily portfolio on crypto — DAILY_STRATEGIES are equity strategies that
# don't run here. The intraday portfolio (built by syncCryptoIntraday) is separate.
frosk.buildportfolio=false
frosk.updatehedgeindex=false
frosk.database.only=COINBASE

frosk.run.omxs30swing=false
frosk.run.dagstrategin=false
frosk.run.manedsportfolj=false
frosk.run.intraday=true
frosk.run.crypto=true

# The crypto system is the 15m intraday pipeline (CryptoRangeBreakout /
# CryptoVWAPReversion). The daily strategy run is disabled by excluding every
# strategy it would otherwise run — the equity-coupled ones never traded, and
# the price-pattern ones all lost money on daily Coinbase candles:
#   CANSLIMStrategy                            — needs EPS growth + 52-week (never traded)
#   HighLanderStrategy                         — needs HedgeIndex + Beta + PEG (never traded)
#   ShortTermMomentumLongTermStrengthStrategy  — HedgeIndex gate/exit inert on crypto (-6.4%)
#   EMATenTwentyStrategy                       — price-only, -12.2% on daily crypto
#   HaramiStrategy                             — price-only candlestick, -2.8%
#   RunawayGAPStrategy                         — price-only, -1.6%
#   EngulfingStrategy                          — price-only candlestick, -0.5%
# The daily Coinbase price sync still runs (CryptoRegimeService needs BTC daily closes).
frosk.strategies.crypto.exclude=CANSLIMStrategy,HighLanderStrategy,ShortTermMomentumLongTermStrengthStrategy,EMATenTwentyStrategy,HaramiStrategy,RunawayGAPStrategy,EngulfingStrategy,CryptoShortIntradayStrategy,CryptoEMACrossLongIntradayStrategy,CryptoEMACrossShortIntradayStrategy

# Disable Yahoo-based schedulers (Tier 0-3 are not relevant for crypto)
scheduler.tier0.cron=-
scheduler.tier1.cron=-
scheduler.tier2.cron=-
scheduler.tier3.cron=-
# Crypto sync runs daily at 00:30
scheduler.crypto.cron=0 30 0 * * *
# Crypto intraday 15m candle sync — every 15 minutes, around the clock
scheduler.crypto.intraday.cron=0 */15 * * * *

# Widen products list (3 new liquid EUR pairs added 2026-06-16)
crypto.intraday.products=BTC-EUR,ETH-EUR,SOL-EUR,AVAX-EUR,LINK-EUR,XRP-EUR,ADA-EUR,DOGE-EUR

# Regime gate: SMA(50) filters more noise than SMA(20) on daily crypto closes
crypto.regime.sma.period=50

# CryptoVWAPReversionIntradayStrategy overrides: tighter stretch clears 1.2%
# round-trip on 15m bars; half-day hold limit (48→24) keeps reversion trades tight.
# NOTE: 5m bar granularity for VWAP requires a separate data pipeline and is not
# a config change — the current pipeline is hardcoded to 15m Coinbase candles.
crypto.vwap.stretch.pct=1.2
crypto.vwap.max.bars.held=24
crypto.vwap.rsi.period=7
crypto.vwap.rsi.entry=35.0

# CryptoRangeBreakoutIntradayStrategy: tighter chandelier (1.8×ATR was 2.5)
# lets profit lock take over once the trade is in the money (Step 4)
crypto.breakout.atr.trail.mult=1.8

# CryptoShortIntradayStrategy mirror params (defaults match the LONG breakout)
crypto.short.range.bars=24
crypto.short.min.range.width.pct=1.5
crypto.short.trend.period=96
crypto.short.atr.stop.mult=1.5
crypto.short.atr.trail.mult=2.5
crypto.short.max.bars.held=96

# CryptoEMACross strategies
crypto.emacross.ema.fast=9
crypto.emacross.ema.slow=21
crypto.emacross.rsi.period=7
crypto.emacross.max.bars.held=32

# ── Live trading ─────────────────────────────────────────────────────────────
# Safety: live orders are OFF by default; enable manually via
# POST /api/crypto/live-trading/enable or set to true here.
crypto.live.trading.enabled=false
# Position size = equity * position.pct.of.equity, clamped to [position.min.eur, max.position.eur].
# Equity = EUR cash balance + cost basis of currently open positions, so sizing scales with account growth/drawdown.
crypto.live.trading.position.pct.of.equity=0.05
crypto.live.trading.position.min.eur=25
crypto.live.trading.max.position.eur=500
crypto.live.trading.max.daily.loss.eur=2000
# Total EUR deployed across all open positions must not exceed this fraction of equity.
crypto.live.trading.max.total.exposure.pct=0.5

# Paper trading: simulates fills for every BUY/SELL signal regardless of the live-trading
# switch above, using one shared account across all strategies. Sizing mirrors live trading
# (crypto.live.trading.position.pct.of.equity/min/max/max.total.exposure.pct) but against this
# account's own simulated equity, not the real Coinbase balance.
crypto.paper.trading.init.capital.eur=2000

# Per-strategy asset exclusions (comma-separated product IDs)
# CryptoShort and CryptoEMACrossShort disabled entirely: Coinbase does not support short selling.
# All intraday products are listed here so isExcluded() returns true for every ticker.
crypto.short.excluded.products=BTC-EUR,ETH-EUR,SOL-EUR,AVAX-EUR,LINK-EUR,XRP-EUR,ADA-EUR,DOGE-EUR
crypto.emacrossshort.excluded.products=BTC-EUR,ETH-EUR,SOL-EUR,AVAX-EUR,LINK-EUR,XRP-EUR,ADA-EUR,DOGE-EUR
# ETH-EUR excluded from VWAPReversion: only loser in otherwise clean strategy (-3.88% all-time)
crypto.vwap.excluded.products=ETH-EUR
# XRP-EUR excluded from EMACrossLong: -2.09% all-time, -0.131% avg — consistent drag
crypto.emacrosslong.excluded.products=XRP-EUR
