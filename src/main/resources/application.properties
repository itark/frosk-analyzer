frosk.runbot=false
frosk.inherent.exitrule=true
frosk.strategy.buy=false
frosk.strategy.buy.amount=true
frosk.init.total.value=100000
frosk.position.value=20000
frosk.tradingaccount.type=SANDBOX

##Highlander
frosk.hedge.criteria.betathreshold=1.1
## Score above this value = risk-off. Scores are regime levels (indicators in
## risk state carried forward), tiers: 0-3 risk-on, 4-7 cautious, 8+ defensive.
frosk.hedge.criteria.risk.threshold=7
frosk.hedge.criteria.pegratio.threshold=1.2 

#https://www.investopedia.com/terms/p/pegratio.asp this value is not used. See strategy code for more info.
frosk.hedge.criteria.yoygrowth.threshold=15

##Top featured strategies
##Greater, or equal than
frosk.criteria.sqn=0.7
frosk.criteria.expectency=0.5
frosk.criteria.profitable.ratio=0.1
frosk.criteria.numberOfTrades=4
frosk.criteria.open=false

